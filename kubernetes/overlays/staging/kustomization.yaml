# kubernetes/overlays/staging/kustomization.yaml
# Staging overlay — production-like config, 2 replicas, info logging

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

resources:
  - ../../base
  - namespace.yaml

patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: secure-api
  - path: hpa-patch.yaml
    target:
      kind: HorizontalPodAutoscaler
      name: secure-api-hpa

images:
  - name: ghcr.io/bam1e/secure-api
    newTag: staging

commonLabels:
  environment: staging

configMapGenerator:
  - name: secure-api-config
    literals:
      - APP_ENV=staging
      - LOG_LEVEL=info
      - REPLICAS=2
