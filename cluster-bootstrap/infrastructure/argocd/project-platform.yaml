# cluster-bootstrap/infrastructure/argocd/project-platform.yaml
# AppProject — defines RBAC boundaries for the platform team
# Restricts which repos, clusters and namespaces can be deployed to

apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Platform infrastructure managed by the platform engineering team"

  # Allowed source repositories
  sourceRepos:
    - https://github.com/bam1e/enterprise-gitops-blueprint.git
    - https://charts.helm.sh/stable
    - https://prometheus-community.github.io/helm-charts
    - https://grafana.github.io/helm-charts
    - https://charts.jetstack.io
    - https://kubernetes.github.io/ingress-nginx

  # Allowed destination clusters and namespaces
  destinations:
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: ingress-nginx
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: kube-system
      server: https://kubernetes.default.svc

  # Allowed cluster-scoped resources
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: cert-manager.io
      kind: ClusterIssuer

  # Namespace-scoped resources allowed
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  # Sync windows — maintenance windows for production
  syncWindows:
    - kind: allow
      schedule: "0 8 * * 1-5"  # Mon-Fri 8am
      duration: 12h
      applications:
        - "*"
      namespaces:
        - monitoring
        - ingress-nginx
    - kind: deny
      schedule: "0 0 * * 6-7"  # Weekends blocked
      duration: 48h
      applications:
        - "*"
      namespaces:
        - argocd
