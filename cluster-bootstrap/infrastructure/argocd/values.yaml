# cluster-bootstrap/infrastructure/argocd/values.yaml
# Production-grade ArgoCD configuration
# Deployed via Helm — managed by Terraform bootstrap

global:
  image:
    tag: "v2.10.0"

configs:
  # ArgoCD server configuration
  cm:
    # Enable status badge
    statusbadge.enabled: "true"
    # Use server-side apply for large CRDs
    server.enable.proxy.extension: "true"
    # Helm release name used as app name
    application.instanceLabelKey: argocd.argoproj.io/app-name
    # Resource customizations for health checks
    resource.customizations.health.argoproj.io_Application: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""
      if obj.status ~= nil then
        if obj.status.health ~= nil then
          hs.status = obj.status.health.status
          if obj.status.health.message ~= nil then
            hs.message = obj.status.health.message
          end
        end
      end
      return hs

  # RBAC configuration
  rbac:
    policy.default: role:readonly
    policy.csv: |
      p, role:platform-admin, applications, *, */*, allow
      p, role:platform-admin, clusters, get, *, allow
      p, role:platform-admin, repositories, *, *, allow
      p, role:platform-admin, projects, *, *, allow
      g, platform-admins, role:platform-admin

  # Repository credentials template
  credentialTemplates:
    github-creds:
      url: https://github.com/bam1e
      githubAppPrivateKey: ""

server:
  replicas: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Ingress for ArgoCD UI
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    hosts:
      - argocd.example.com
    tls:
      - secretName: argocd-tls
        hosts:
          - argocd.example.com

repoServer:
  replicas: 2
  resources:
    requests:
      cpu: 256m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # Enable Helm and Kustomize plugins
  env:
    - name: HELM_CACHE_HOME
      value: /helm-working-dir
    - name: HELM_CONFIG_HOME
      value: /helm-working-dir
    - name: HELM_DATA_HOME
      value: /helm-working-dir

applicationSet:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

notifications:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
